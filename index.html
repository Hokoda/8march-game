<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра для тебя ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  text-align:center;

  background-image:url("dog.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

#score{
  position:absolute;
  top:20px;
  left:20px;
  font-size:22px;
  color:white;
  background:rgba(0,0,0,0.4);
  padding:8px 12px;
  border-radius:10px;
}

.heart{
  position:absolute;
  font-size:34px;
  cursor:pointer;
}

#message{
  display:none;
  position:absolute;
  top:40%;
  width:100%;
  font-size:30px;
  color:white;
  text-shadow:2px 2px 8px black;
  padding:20px;
}
</style>
</head>

<body>

<div id="score">❤️ Поймано: 0</div>

<div id="message">
С 8 марта 🌸<br><br>
Ты поймала все сердечки,<br>
но моё уже давно у тебя ❤️
</div>

<script>

let score = 0;

function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random()*window.innerWidth + "px";
  heart.style.top = "-40px";

  document.body.appendChild(heart);

  let fall = setInterval(()=>{
    heart.style.top = heart.offsetTop + 3 + "px";

    if(heart.offsetTop > window.innerHeight){
      heart.remove();
      clearInterval(fall);
    }
  },20);

  heart.onclick = ()=>{
    score++;

    document.getElementById("score").innerText =
    "❤️ Поймано: " + score;

    heart.remove();
    clearInterval(fall);

    if(score >= 10){
      document.getElementById("message").style.display="block";
    }
  }
}

setInterval(createHeart,800);

</script>

</body>
</html>
